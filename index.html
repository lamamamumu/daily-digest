<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Digest</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a38;--accent-stock:#00ff88;--accent-tech:#00aaff;--accent-ai:#aa55ff;--text:#e8e8f0;--text-muted:#6b6b80;--font-mono:'Space Mono',monospace;--font-body:'Sarabun',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.container{max-width:1280px;margin:0 auto;padding:0 24px;position:relative;z-index:1;}
header{padding:32px 0 24px;border-bottom:1px solid var(--border);margin-bottom:32px;}
.header-inner{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.logo{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:6px;}
h1{font-family:var(--font-mono);font-size:clamp(22px,4vw,36px);font-weight:700;letter-spacing:-0.02em;line-height:1;}
.date-display{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);text-align:right;}
#live-time{font-size:22px;font-weight:700;color:var(--accent-stock);display:block;margin-top:4px;}
.tabs{display:flex;gap:4px;margin-bottom:18px;overflow-x:auto;scrollbar-width:none;}
.tab-btn{background:none;border:1px solid var(--border);color:var(--text-muted);padding:8px 18px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;cursor:pointer;white-space:nowrap;transition:all 0.2s;border-radius:4px;}
.tab-btn:hover{border-color:#555;color:var(--text);}
.tab-btn.active{color:#000;font-weight:700;border-color:transparent;}
.tab-btn[data-tab="stock"].active{background:var(--accent-stock);}
.tab-btn[data-tab="tech"].active{background:var(--accent-tech);}
.tab-btn[data-tab="ai"].active{background:var(--accent-ai);}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:7px;vertical-align:middle;}
.tab-btn[data-tab="stock"] .dot{background:var(--accent-stock);}
.tab-btn[data-tab="tech"] .dot{background:var(--accent-tech);}
.tab-btn[data-tab="ai"] .dot{background:var(--accent-ai);}
.filter-row{display:flex;align-items:center;gap:10px;margin-bottom:28px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
.toggle{position:relative;width:36px;height:20px;background:var(--border);border-radius:10px;cursor:pointer;transition:background 0.2s;flex-shrink:0;}
.toggle.on{background:var(--accent-stock);}
.toggle .knob{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform 0.2s;}
.toggle.on .knob{transform:translateX(16px);}
.section{display:none;}.section.active{display:block;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
.section-title{font-family:var(--font-mono);font-size:13px;letter-spacing:0.12em;text-transform:uppercase;}
.btn-row{display:flex;gap:8px;}
.refresh-btn,.summarize-btn{background:none;border:1px solid var(--border);color:var(--text-muted);padding:6px 14px;font-family:var(--font-mono);font-size:10px;cursor:pointer;border-radius:4px;transition:all 0.2s;}
.refresh-btn:hover{border-color:#555;color:var(--text);}
.summarize-btn{border-color:var(--accent-ai);color:var(--accent-ai);}
.summarize-btn:hover{background:var(--accent-ai);color:#000;}
.refresh-btn.loading{opacity:0.5;pointer-events:none;}
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
.news-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;transition:border-color 0.2s,transform 0.2s;text-decoration:none;color:inherit;display:block;animation:fadeIn 0.4s ease both;}
.news-card:hover{border-color:#444;transform:translateY(-2px);}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.card-source{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.card-accent-bar{width:24px;height:2px;border-radius:1px;flex-shrink:0;}
.fresh-tag{margin-left:auto;color:var(--accent-stock);font-size:9px;}
.card-title{font-size:15px;font-weight:600;line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-desc{font-size:13px;color:var(--text-muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:14px;}
.card-footer{display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
.skeleton-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.skeleton-line{background:var(--surface2);border-radius:4px;margin-bottom:10px;}
.error-box{background:#1a0a0a;border:1px solid #3a1a1a;border-radius:8px;padding:24px;font-family:var(--font-mono);font-size:12px;color:#ff6666;text-align:center;line-height:2;grid-column:1/-1;}
.empty-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;font-family:var(--font-mono);font-size:12px;color:var(--text-muted);text-align:center;line-height:2;grid-column:1/-1;}
.status-bar{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:24px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
.status-item{display:flex;align-items:center;gap:6px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-stock);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
footer{margin-top:60px;padding:24px 0;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-align:center;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--accent-ai);color:#000;padding:14px 24px;border-radius:8px;font-family:var(--font-mono);font-size:13px;font-weight:700;z-index:100;transition:transform 0.3s;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="container">
<header><div class="header-inner"><div><div class="logo">// Personal Intelligence Feed</div><h1>DAILY DIGEST</h1></div><div class="date-display"><span id="live-date"></span><span id="live-time"></span></div></div></header>
<div class="status-bar"><div class="status-item"><span class="status-dot"></span>Live RSS Feed</div><div class="status-item" id="last-updated">กำลังโหลด...</div><div class="status-item" id="total-count"></div></div>
<div class="tabs">
<button class="tab-btn active" data-tab="stock"><span class="dot"></span>หุ้น &amp; การเงิน</button>
<button class="tab-btn" data-tab="tech"><span class="dot"></span>Tech</button>
<button class="tab-btn" data-tab="ai"><span class="dot"></span>งานสาย AI / DE / DS / DA</button>
</div>
<div class="filter-row"><div class="toggle on" id="fresh-toggle" onclick="toggleFresh()"><div class="knob"></div></div><span id="fresh-label">เฉพาะข่าวใน 24 ชม. (เปิดอยู่)</span></div>
<div class="section active" id="section-stock"><div class="section-header"><span class="section-title" style="color:var(--accent-stock)">📈 ข่าวหุ้น &amp; การเงิน</span><div class="btn-row"><button class="summarize-btn" onclick="copyPrompt('stock')">📋 คัดลอก prompt สรุป</button><button class="refresh-btn" onclick="loadSection('stock',true)">↻ refresh</button></div></div><div class="news-grid" id="grid-stock"></div></div>
<div class="section" id="section-tech"><div class="section-header"><span class="section-title" style="color:var(--accent-tech)">💻 Tech News</span><div class="btn-row"><button class="summarize-btn" onclick="copyPrompt('tech')">📋 คัดลอก prompt สรุป</button><button class="refresh-btn" onclick="loadSection('tech',true)">↻ refresh</button></div></div><div class="news-grid" id="grid-tech"></div></div>
<div class="section" id="section-ai"><div class="section-header"><span class="section-title" style="color:var(--accent-ai)">🤖 งานสาย AI · DE · DS · DA</span><div class="btn-row"><button class="summarize-btn" onclick="copyPrompt('ai')">📋 คัดลอก prompt สรุป</button><button class="refresh-btn" onclick="loadSection('ai',true)">↻ refresh</button></div></div><div class="news-grid" id="grid-ai"></div></div>
<footer>DAILY DIGEST — RSS via rss2json · ฟรี 100% · กรองข่าวใน 24 ชม. · คัดลอก prompt ไปวางใน Claude</footer>
</div>
<div id="toast"></div>
<script>
var PROXY='https://api.rss2json.com/v1/api.json?rss_url=';
var DAY=24*60*60*1000;
var freshOnly=true;
var LABELS={stock:'ข่าวหุ้นและการเงิน',tech:'ข่าวเทคโนโลยี',ai:'เนื้อหาสายงาน AI / Data Engineering / Data Science / Data Analytics (เครื่องมือใหม่ เทคนิค tutorial โมเดล framework best practice)'};
var SOURCES={
stock:[{name:'Yahoo Finance',url:'https://finance.yahoo.com/news/rssindex',accent:'#00ff88'},{name:'WSJ Markets',url:'https://feeds.a.dj.com/rss/RSSMarketsMain.xml',accent:'#00cc66'}],
tech:[{name:'TechCrunch',url:'https://techcrunch.com/feed/',accent:'#00aaff'},{name:'The Verge',url:'https://www.theverge.com/rss/index.xml',accent:'#0088dd'},{name:'Wired',url:'https://www.wired.com/feed/rss',accent:'#0066bb'}],
ai:[{name:'Towards Data Science',url:'https://towardsdatascience.com/feed',accent:'#aa55ff'},{name:'KDnuggets',url:'https://www.kdnuggets.com/feed',accent:'#cc77ff'},{name:'ML Mastery',url:'https://machinelearningmastery.com/feed/',accent:'#9944ee'},{name:'Hugging Face',url:'https://huggingface.co/blog/feed.xml',accent:'#bb66ff'}]
};
var RAW={stock:[],tech:[],ai:[]};
function isFresh(d){if(!d)return false;return (Date.now()-new Date(d).getTime())<DAY;}
function visible(tab){var all=RAW[tab]||[];return freshOnly?all.filter(function(i){return isFresh(i.date);}):all;}
function sk(n){n=n||6;var a=[];for(var i=0;i<n;i++){a.push('<div class="skeleton-card"><div class="skeleton-line" style="height:10px;width:40%;margin-bottom:14px"></div><div class="skeleton-line" style="height:16px;width:90%"></div><div class="skeleton-line" style="height:16px;width:72%"></div></div>');}return a.join('');}
function ago(d){if(!d)return'';var m=Math.floor((Date.now()-new Date(d))/60000);if(m<1)return'เมื่อกี้';if(m<60)return m+' นาทีที่แล้ว';var h=Math.floor(m/60);if(h<24)return h+' ชม.ที่แล้ว';return Math.floor(h/24)+' วันที่แล้ว';}
function ff(s){return fetch(PROXY+encodeURIComponent(s.url)).then(function(r){return r.json();}).then(function(j){if(j.status!=='ok')return[];return (j.items||[]).slice(0,15).map(function(i){return {title:i.title,link:i.link,desc:(i.description||'').replace(/<[^>]*>/g,'').trim().slice(0,180),date:i.pubDate,source:s.name,accent:s.accent};});});}
var loaded={};
function render(tab){
var g=document.getElementById('grid-'+tab);var items=visible(tab);
if(!RAW[tab].length){g.innerHTML='<div class="error-box">⚠ โหลดข่าวไม่ได้<br>รอ 1 นาทีแล้วกด refresh</div>';return;}
if(!items.length){g.innerHTML='<div class="empty-box">ไม่มีข่าวใหม่ใน 24 ชม.<br>ลองปิดตัวกรองเพื่อดูข่าวทั้งหมด</div>';}
else{g.innerHTML=items.map(function(i,n){return '<a class="news-card" href="'+i.link+'" target="_blank" rel="noopener" style="animation-delay:'+(n*0.04)+'s"><div class="card-source"><span class="card-accent-bar" style="background:'+i.accent+'"></span>'+i.source+(isFresh(i.date)?'<span class="fresh-tag">● NEW</span>':'')+'</div><div class="card-title">'+i.title+'</div>'+(i.desc?'<div class="card-desc">'+i.desc+'…</div>':'')+'<div class="card-footer"><span>'+ago(i.date)+'</span><span>อ่านต่อ →</span></div></a>';}).join('');}
document.getElementById('total-count').textContent=items.length+' ข่าว'+(freshOnly?' (24ชม.)':'');
}
function loadSection(tab,force){
if(loaded[tab]&&!force){render(tab);return;}
var g=document.getElementById('grid-'+tab);g.innerHTML=sk();
var b=document.querySelector('#section-'+tab+' .refresh-btn');if(b)b.classList.add('loading');
Promise.allSettled(SOURCES[tab].map(ff)).then(function(res){
var items=[];res.forEach(function(r){if(r.status==='fulfilled')items=items.concat(r.value);});
items=items.filter(function(i){return i.title;}).sort(function(a,b){return new Date(b.date)-new Date(a.date);});
RAW[tab]=items;loaded[tab]=true;
document.getElementById('last-updated').textContent='อัปเดต: '+new Date().toLocaleTimeString('th-TH');
render(tab);
if(b)b.classList.remove('loading');
});
}
function toggleFresh(){freshOnly=!freshOnly;var t=document.getElementById('fresh-toggle');t.classList.toggle('on',freshOnly);document.getElementById('fresh-label').textContent=freshOnly?'เฉพาะข่าวใน 24 ชม. (เปิดอยู่)':'แสดงทั้งหมด (ปิดอยู่)';var active=document.querySelector('.tab-btn.active');if(active)render(active.dataset.tab);}
function copyPrompt(tab){
var items=visible(tab);
if(!items||!items.length){showToast(freshOnly?'ไม่มีข่าวใหม่ใน 24 ชม.':'ยังไม่มีข่าว ลอง refresh');return;}
var p='ช่วยสรุป'+LABELS[tab]+'ต่อไปนี้ให้หน่อย เฉพาะข่าวภายใน 24 ชม.ล่าสุดเท่านั้น จัดกลุ่มตามธีม ไฮไลต์ประเด็นสำคัญ เป็นภาษาไทย (ถ้าข่าวไหนดูเก่ากว่า 24 ชม. ข้ามไป):\n\n';
items.forEach(function(i,n){p+=(n+1)+'. ['+i.source+'] '+i.title+'\n';if(i.date)p+='   เวลา: '+ago(i.date)+'\n';if(i.desc)p+='   '+i.desc+'\n';p+='   '+i.link+'\n\n';});
navigator.clipboard.writeText(p).then(function(){showToast('✓ คัดลอกแล้ว! วางในแชท Claude ('+items.length+' ข่าว 24ชม.)');}).catch(function(){showToast('คัดลอกไม่สำเร็จ');});
}
var toastTimer;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.classList.remove('show');},3500);}
document.querySelectorAll('.tab-btn').forEach(function(b){b.addEventListener('click',function(){var t=b.dataset.tab;document.querySelectorAll('.tab-btn').forEach(function(x){x.classList.remove('active');});document.querySelectorAll('.section').forEach(function(x){x.classList.remove('active');});b.classList.add('active');document.getElementById('section-'+t).classList.add('active');loadSection(t);});});
function clock(){var n=new Date();document.getElementById('live-time').textContent=n.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});document.getElementById('live-date').textContent=n.toLocaleDateString('th-TH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}
setInterval(clock,1000);clock();loadSection('stock');
</script>
</body>
</html>
