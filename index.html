<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Digest</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a38;--accent-stock:#00ff88;--accent-tech:#00aaff;--accent-ai:#aa55ff;--text:#e8e8f0;--text-muted:#6b6b80;--font-mono:'Space Mono',monospace;--font-body:'Sarabun',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.container{max-width:1280px;margin:0 auto;padding:0 24px;position:relative;z-index:1;}
header{padding:32px 0 24px;border-bottom:1px solid var(--border);margin-bottom:32px;}
.header-inner{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.logo{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:6px;}
h1{font-family:var(--font-mono);font-size:clamp(22px,4vw,36px);font-weight:700;letter-spacing:-0.02em;line-height:1;}
.date-display{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);text-align:right;}
#live-time{font-size:22px;font-weight:700;color:var(--accent-stock);display:block;margin-top:4px;}
.tabs{display:flex;gap:4px;margin-bottom:28px;overflow-x:auto;scrollbar-width:none;}
.tab-btn{background:none;border:1px solid var(--border);color:var(--text-muted);padding:8px 18px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;cursor:pointer;white-space:nowrap;transition:all 0.2s;border-radius:4px;}
.tab-btn:hover{border-color:#555;color:var(--text);}
.tab-btn.active{color:#000;font-weight:700;border-color:transparent;}
.tab-btn[data-tab=stock].active{background:var(--accent-stock);}
.tab-btn[data-tab=tech].active{background:var(--accent-tech);}
.tab-btn[data-tab=ai].active{background:var(--accent-ai);}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:7px;vertical-align:middle;}
.tab-btn[data-tab=stock] .dot{background:var(--accent-stock);}
.tab-btn[data-tab=tech] .dot{background:var(--accent-tech);}
.tab-btn[data-tab=ai] .dot{background:var(--accent-ai);}
.section{display:none;}.section.active{display:block;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
.section-title{font-family:var(--font-mono);font-size:13px;letter-spacing:0.12em;text-transform:uppercase;}
.refresh-btn{background:none;border:1px solid var(--border);color:var(--text-muted);padding:6px 14px;font-family:var(--font-mono);font-size:10px;cursor:pointer;border-radius:4px;transition:all 0.2s;}
.refresh-btn.loading{opacity:0.5;pointer-events:none;}
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
.news-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;transition:border-color 0.2s,transform 0.2s;text-decoration:none;color:inherit;display:block;animation:fadeIn 0.4s ease both;}
.news-card:hover{border-color:#444;transform:translateY(-2px);}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.card-source{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.card-accent-bar{width:24px;height:2px;border-radius:1px;flex-shrink:0;}
.card-title{font-size:15px;font-weight:600;line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-desc{font-size:13px;color:var(--text-muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:14px;}
.card-footer{display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
.skeleton-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.skeleton-line{background:var(--surface2);border-radius:4px;margin-bottom:10px;}
.error-box{background:#1a0a0a;border:1px solid #3a1a1a;border-radius:8px;padding:24px;font-family:var(--font-mono);font-size:12px;color:#ff6666;text-align:center;line-height:2;grid-column:1/-1;}
.status-bar{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:24px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
.status-item{display:flex;align-items:center;gap:6px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-stock);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
footer{margin-top:60px;padding:24px 0;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-align:center;}
</style>
</head>
<body>
<div class="container">
<header><div class="header-inner"><div><div class="logo">// Personal Intelligence Feed</div><h1>DAILY DIGEST</h1></div><div class="date-display"><span id="live-date"></span><span id="live-time"></span></div></div></header>
<div class="status-bar"><div class="status-item"><span class="status-dot"></span>Live RSS Feed</div><div class="status-item" id="last-updated">กำลังโหลด...</div><div class="status-item" id="total-count"></div></div>
<div class="tabs">
<button class="tab-btn active" data-tab="stock"><span class="dot"></span>หุ้น &amp; การเงิน</button>
<button class="tab-btn" data-tab="tech"><span class="dot"></span>Tech</button>
<button class="tab-btn" data-tab="ai"><span class="dot"></span>AI · DE · DS · DA</button>
</div>
<div class="section active" id="section-stock"><div class="section-header"><span class="section-title" style="color:var(--accent-stock)">📈 ข่าวหุ้น &amp; การเงิน</span><button class="refresh-btn" onclick="loadSection('stock',true)">↻ refresh</button></div><div class="news-grid" id="grid-stock"></div></div>
<div class="section" id="section-tech"><div class="section-header"><span class="section-title" style="color:var(--accent-tech)">💻 Tech News</span><button class="refresh-btn" onclick="loadSection('tech',true)">↻ refresh</button></div><div class="news-grid" id="grid-tech"></div></div>
<div class="section" id="section-ai"><div class="section-header"><span class="section-title" style="color:var(--accent-ai)">🤖 AI · DE · DS · DA</span><button class="refresh-btn" onclick="loadSection('ai',true)">↻ refresh</button></div><div class="news-grid" id="grid-ai"></div></div>
<footer>DAILY DIGEST — RSS via allorigins proxy · ฟรี 100% · ไม่มี backend</footer>
</div>
<script>
const PROXY='https://api.allorigins.win/get?url=';
const SOURCES={stock:[{name:'Reuters Business',url:'https://feeds.reuters.com/reuters/businessNews',accent:'#00ff88'},{name:'Yahoo Finance',url:'https://finance.yahoo.com/news/rssindex',accent:'#00cc66'},{name:'Investing.com',url:'https://www.investing.com/rss/news.rss',accent:'#00ff88'}],tech:[{name:'TechCrunch',url:'https://techcrunch.com/feed/',accent:'#00aaff'},{name:'The Verge',url:'https://www.theverge.com/rss/index.xml',accent:'#0088dd'},{name:'Wired',url:'https://www.wired.com/feed/rss',accent:'#0066bb'}],ai:[{name:'MIT Tech Review',url:'https://www.technologyreview.com/feed/',accent:'#aa55ff'},{name:'KDnuggets',url:'https://www.kdnuggets.com/feed',accent:'#cc77ff'},{name:'AI News',url:'https://www.artificialintelligence-news.com/feed/',accent:'#8833ee'}]};
function sk(n=6){return Array(n).fill(0).map(()=>'<div class="skeleton-card"><div class="skeleton-line" style="height:10px;width:40%;margin-bottom:14px"></div><div class="skeleton-line" style="height:16px;width:90%"></div><div class="skeleton-line" style="height:16px;width:72%"></div></div>').join('');}
function parseXML(x){const doc=new DOMParser().parseFromString(x,'application/xml');const it=[];doc.querySelectorAll('item').forEach(i=>it.push({title:i.querySelector('title')?.textContent?.trim()||'',link:i.querySelector('link')?.textContent?.trim()||'#',desc:(i.querySelector('description')?.textContent||'').replace(/<[^>]*>/g,'').trim().slice(0,140),date:i.querySelector('pubDate')?.textContent||''}));if(!it.length)doc.querySelectorAll('entry').forEach(i=>it.push({title:i.querySelector('title')?.textContent?.trim()||'',link:i.querySelector('link')?.getAttribute('href')||'#',desc:(i.querySelector('summary,content')?.textContent||'').replace(/<[^>]*>/g,'').trim().slice(0,140),date:i.querySelector('updated,published')?.textContent||''}));return it;}
function ago(d){if(!d)return'';const m=Math.floor((Date.now()-new Date(d))/60000);if(m<1)return'เมื่อกี้';if(m<60)return m+' นาทีที่แล้ว';const h=Math.floor(m/60);if(h<24)return h+' ชม.ที่แล้ว';return Math.floor(h/24)+' วันที่แล้ว';}
async function ff(s){const r=await fetch(PROXY+encodeURIComponent(s.url));const j=await r.json();return parseXML(j.contents||'').slice(0,10).map(i=>({...i,source:s.name,accent:s.accent}));}
const ld={};
async function loadSection(tab,force=false){if(ld[tab]&&!force)return;const g=document.getElementById('grid-'+tab);g.innerHTML=sk();const b=document.querySelector('#section-'+tab+' .refresh-btn');if(b)b.classList.add('loading');const res=await Promise.allSettled(SOURCES[tab].map(ff));const items=res.filter(r=>r.status==='fulfilled').flatMap(r=>r.value).filter(i=>i.title).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,24);if(!items.length){g.innerHTML='<div class="error-box">⚠ โหลดข่าวไม่ได้<br>กด ↻ refresh อีกครั้ง</div>';}else{g.innerHTML=items.map((i,n)=>'<a class="news-card" href="'+i.link+'" target="_blank" rel="noopener" style="animation-delay:'+n*0.04+'s"><div class="card-source"><span class="card-accent-bar" style="background:'+i.accent+'"></span>'+i.source+'</div><div class="card-title">'+i.title+'</div>'+(i.desc?'<div class="card-desc">'+i.desc+'…</div>':'')+'<div class="card-footer"><span>'+ago(i.date)+'</span><span>อ่านต่อ →</span></div></a>').join('');ld[tab]=true;document.getElementById('last-updated').textContent='อัปเดต: '+new Date().toLocaleTimeString('th-TH');document.getElementById('total-count').textContent=items.length+' ข่าว';}if(b)b.classList.remove('loading');}
document.querySelectorAll('.tab-btn').forEach(b=>{b.addEventListener('click',()=>{const t=b.dataset.tab;document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('section-'+t).classList.add('active');loadSection(t);});});
function clock(){const n=new Date();document.getElementById('live-time').textContent=n.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});document.getElementById('live-date').textContent=n.toLocaleDateString('th-TH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}
setInterval(clock,1000);clock();loadSection('stock');
</script>
</body>
</html>
